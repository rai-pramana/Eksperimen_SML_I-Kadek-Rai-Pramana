# Preprocessing Automation Workflow
# Author: I Kadek Rai Pramana
#
# Workflow ini melakukan preprocessing otomatis pada dataset Heart Disease
# setiap kali trigger dipantik (push ke master).

name: Automated Preprocessing Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'heart_disease_raw.csv'
      - 'preprocessing/**'
  workflow_dispatch:  # Manual trigger

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib

      # Step 4: Run Preprocessing
      - name: Run Automated Preprocessing
        run: |
          cd preprocessing
          python automate_I-Kadek-Rai-Pramana.py

      # Step 5: Upload Preprocessed Dataset
      - name: Upload Preprocessed Dataset
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/heart_disease_preprocessing/
          retention-days: 30

      # Step 6: Commit preprocessed data back to repo
      - name: Commit Preprocessed Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add preprocessing/heart_disease_preprocessing/
          git diff --staged --quiet || git commit -m "Auto: Update preprocessed dataset"
          git push || echo "Nothing to push"
